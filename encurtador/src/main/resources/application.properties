spring.application.name=encurtador_database
spring.profiles.active=prod

# Configuracao do banco PostgreSQL (variaveis de ambiente)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Configuracoes do Hibernate para PostgreSQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.hibernate.ddl-auto=create

# Configuracoes do HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# Configuracoes de Logging para desenvolvimento
logging.level.org.springframework=INFO
logging.level.com.ecoville.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# Porta do servidor local
server.port=8081